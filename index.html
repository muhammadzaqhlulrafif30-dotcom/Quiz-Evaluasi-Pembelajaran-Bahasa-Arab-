    .option-btn:hover{border-color:#9eb7aa; transform:translateY(-1px);}
    .option-btn.selected{
      border-color:var(--forest);
      background:#eef5f0;
      box-shadow:0 0 0 2px rgba(21,63,53,.08);
    }
    .progress-fill{transition:width .35s ease}
    .view{display:none}
    .view.active{display:block}
    .fade-in{animation:fadeIn .45s ease both}
    @keyframes fadeIn{
      from{opacity:0;transform:translateY(8px)}
      to{opacity:1;transform:translateY(0)}
    }
    .result-row{transition:.2s ease}
    .result-row:hover{background:#f8fbf8}
    .focus-ring:focus-visible{

      outline-offset:3px;

   <div data-template-id="result-row" class="canva-card result-row grid grid-cols-[1fr_90px_130px] gap-3 px-5 py-4 border-b border-[#edf1ee] items-center">

     <p data-template-id="result-row-meta" class="canva-text text-xs mt-1"></p>
    </div>
    <div data-template-id="result-row-score" class="canva-text font-bold text-[#153f35]"></div>

   </div>
  </template>
  <script>
    lucide.createIcons();

    const totalQuestions = 20;
    let currentQuestion = 0;
    let selectedChoice = null;
    let score = 0;
    let studentName = "";
    let allResults = [];

    const views = {
      start: document.getElementById('startView'),
      quiz: document.getElementById('quizView'),
      result: document.getElementById('resultView'),
      results: document.getElementById('resultsView')
    };

    function showView(name){
      Object.values(views).forEach(v => v.classList.remove('active'));
      views[name].classList.add('active');
      window.scrollTo({top:0, behavior:'smooth'});
    }

    const questionBlocks = [...document.querySelectorAll('.question-block')];
    const nextButton = document.getElementById('nextButton');

    function updateQuestionUI(){
      questionBlocks.forEach((q, i) => q.classList.toggle('hidden', i !== currentQuestion));
      const active = questionBlocks[currentQuestion];
      document.getElementById('questionCounter').textContent = `Soal ${currentQuestion + 1} dari ${totalQuestions}`;
      document.getElementById('levelLabel').textContent = active.dataset.level;
      document.getElementById('progressFill').style.width = `${((currentQuestion + 1) / totalQuestions) * 100}%`;
      selectedChoice = null;
      nextButton.classList.add('opacity-50','pointer-events-none');
      active.querySelectorAll('.option-btn').forEach(btn => btn.classList.remove('selected'));
    }

    questionBlocks.forEach(block => {
      block.querySelectorAll('.option-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          block.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'));
          btn.classList.add('selected');
          selectedChoice = btn.dataset.choice;
          nextButton.classList.remove('opacity-50','pointer-events-none');
        });
      });
    });

    document.getElementById('startForm').addEventListener('submit', (e)=>{
      e.preventDefault();
      const input = document.getElementById('studentName');
      const error = document.getElementById('nameError');
      const value = input.value.trim();
      if(!value){
        error.classList.remove('hidden');
        input.focus();
        return;
      }
      error.classList.add('hidden');
      studentName = value;
      document.getElementById('participantName').textContent = studentName;
      currentQuestion = 0;
      score = 0;
      updateQuestionUI();
      showView('quiz');
    });

    nextButton.addEventListener('click', async ()=>{
      if(selectedChoice === null) return;
      const active = questionBlocks[currentQuestion];
      if(selectedChoice === active.dataset.answer) score++;

      if(currentQuestion < totalQuestions - 1){
        currentQuestion++;
        updateQuestionUI();
      }else{
        await finishQuiz();
      }
    });

    async function finishQuiz(){
      showView('result');
      const percentage = Math.round((score / totalQuestions) * 100);
      document.getElementById('finalScore').textContent = percentage;
      document.getElementById('scoreSummary').textContent = `${score} jawaban benar dari ${totalQuestions} soal`;
      await saveResult();
    }

    async function saveResult(){
      const status = document.getElementById('saveStatus');
      status.textContent = 'Menyimpan hasil...';
      if(allResults.length >= 999){
        status.textContent = 'Batas penyimpanan hasil sudah tercapai.';
        return;
      }
      const result = await window.dataSdk.create({
        student_name: studentName,
        score: Math.round((score / totalQuestions) * 100),
        total_questions: totalQuestions,
        completed_at: new Date().toISOString()
      });
      if(result.isOk){
        status.textContent = 'Hasil berhasil disimpan.';
      }else{
        status.textContent = 'Hasil belum dapat disimpan. Coba lagi beberapa saat.';
      }
    }

    document.getElementById('retryButton').addEventListener('click', ()=>{
      document.getElementById('studentName').value = '';
      showView('start');
    });

    document.getElementById('openResultsButton').addEventListener('click', ()=>showView('results'));
    document.getElementById('openResultsTop').addEventListener('click', ()=>showView('results'));
    document.getElementById('backHomeButton').addEventListener('click', ()=>showView('start'));

    function renderResults(data){
      allResults = data || [];
      const list = document.getElementById('resultsList');
      const empty = document.getElementById('emptyResults');
      const existing = new Map([...list.children].map(el => [el.dataset.id, el]));

      const sorted = [...allResults].sort((a,b)=> new Date(b.completed_at) - new Date(a.completed_at));

      sorted.forEach(item=>{
        let row = existing.get(item.__backendId);
        if(!row){
          const fragment = document.getElementById('resultRowTemplate').content.cloneNode(true);
          row = fragment.firstElementChild;
          row.dataset.id = item.__backendId;
          list.appendChild(row);
        }
        row.querySelector('[data-template-id="result-row-name"]').textContent = item.student_name || '-';
        row.querySelector('[data-template-id="result-row-meta"]').textContent = `${item.total_questions || 20} soal`;
        row.querySelector('[data-template-id="result-row-score"]').textContent = `${item.score || 0}%`;
        const date = item.completed_at ? new Date(item.completed_at) : null;
        row.querySelector('[data-template-id="result-row-date"]').textContent = date ? date.toLocaleDateString('id-ID',{day:'2-digit',month:'short',year:'numeric'}) : '-';
        existing.delete(item.__backendId);
      });

      existing.forEach(el=>el.remove());
      empty.classList.toggle('hidden', sorted.length > 0);
      lucide.createIcons();
    }

    const dataHandler = {
      onDataChanged(data){
        renderResults(data);
      }
    };

    (async()=>{
      const initResult = await window.dataSdk.init(dataHandler);
      if(!initResult.isOk){
        document.getElementById('saveStatus').textContent = 'Penyimpanan hasil belum tersedia.';
      }
    })();
  </script>
